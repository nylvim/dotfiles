<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

    <match target="pattern">
        <edit name="rgba" mode="assign">
            <const>rgb</const>
        </edit>
    </match>

    <!-- basic config -->

    <match target="font">
        <edit name="family" mode="prepend" binding="strong">
            <name>Symbols Nerd Font</name>
        </edit>
    </match>

    <alias>
        <family>serif</family>
        <prefer>
            <family>Symbols Nerd Font</family>
            <family>Noto Serif</family>
            <family>Noto Serif CJK SC</family>
        </prefer>
    </alias>

    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Symbols Nerd Font</family>
            <family>Noto Sans</family>
            <family>Noto Sans CJK SC</family>
        </prefer>
    </alias>

    <alias>
        <family>monospace</family>
        <prefer>
            <family>Symbols Nerd Font</family>
            <family>Roboto Mono</family>
            <family>Noto Sans Mono CJK SC</family>
        </prefer>
    </alias>

    <alias>
        <family>system-ui</family>
        <prefer><family>sans-serif</family></prefer>
    </alias>

    <alias>
        <family>emoji</family>
        <prefer>
            <family>Symbols Nerd Font</family>
            <family>Noto Color Emoji</family>
            <family>sans-serif</family>
        </prefer>
    </alias>

    <!-- aliases for my convenience -->

    <alias>
        <family>code</family>
        <prefer>
            <family>Fragment Mono</family>
            <family>sans-serif</family>
        </prefer>
    </alias>

    <alias>
        <family>terminal</family>
        <prefer>
            <family>Symbols Nerd Font</family>
            <family>Roboto Mono</family>
            <!-- monochrome emojis in terminals -->
            <family>Noto Emoji</family>
            <family>sans-serif</family>
        </prefer>
    </alias>

    <!-- Noto CJK aliases -->

    <alias>
        <family>Noto Serif SC</family>
        <prefer><family>Noto Serif CJK SC</family></prefer>
    </alias>

    <alias>
        <family>Noto Sans SC</family>
        <prefer><family>Noto Sans CJK SC</family></prefer>
    </alias>

</fontconfig>
