patch:
  schema_list:
    - schema: rime_frost

  menu/page_size: 5

  ascii_composer/switch_key:
    Shift_L: commit_code
    Shift_R: commit_code
  switcher/hotkeys:
    - F4

  punctuator/half_shape:
    "`": "·"
    "!": "！"
    "$": "¥"
    "^": "⋯"
    "(": "（"
    ")": "）"
    "_": "──"
    "{": "【"
    "}": "】"
    "\\": "、"
    ":": "："
    ";": "；"
    '"': { pair: ["「", "」"] }
    "'": { pair: ["『", "』"] }
    ",": "，"
    ".": "。"
    "<": "《"
    ">": "》"
    "?": "？"
